[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
line-length = 88
extend-exclude = [".venv", "build", "dist"]

[tool.ruff.lint]
# E/F/W = pycodestyle + pyflakes de base, I = isort.
select = ["E", "F", "W", "I"]
# E731 (affectation de lambda) et E741 (nom ambigu 'l') : choix de style
# intentionnels dans ce prototype (ex. `bar = lambda x: ...` dans render).
ignore = ["E731", "E741"]

[tool.ruff.lint.per-file-ignores]
# Les tests réinjectent le chemin racine via sys.path avant l'import azur.
"tests/*" = ["E402"]
